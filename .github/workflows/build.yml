name: Build Ghostgram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write build configuration
        run: |
          cat > build-system/template_minimal_development_configuration.json << 'EOF'
          {
            "bundle_id": "org.ghostgram.Telegram",
            "api_id": "31594520",
            "api_hash": "ae0b6c1dbcf117dd791bb993f8e33df9",
            "team_id": "PLACEHOLDER",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

      - name: Patch .bazelrc for Bazel 8
        run: |
          echo "common --enable_workspace=true" >> .bazelrc

      - name: Install Bazelisk
        run: brew install bazelisk

      - name: Download Bazel and patch versions.json
        run: |
          BAZEL_VERSION=$(python3 -c "
          import json
          v = json.load(open('versions.json'))['bazel']
          print(v.split(':')[0])
          ")

          if [ "$(uname -m)" = "arm64" ]; then
            PLATFORM="darwin-arm64"
          else
            PLATFORM="darwin-x86_64"
          fi

          BAZEL_NAME="bazel-${BAZEL_VERSION}-${PLATFORM}"
          mkdir -p build-input

          echo "Downloading $BAZEL_NAME..."
          curl -L             "https://github.com/bazelbuild/bazel/releases/download/${BAZEL_VERSION}/${BAZEL_NAME}"             -o "build-input/${BAZEL_NAME}"
          chmod +x "build-input/${BAZEL_NAME}"

          REAL_SHA=$(shasum -a 256 "build-input/${BAZEL_NAME}" | awk '{print $1}')
          echo "Real SHA256: $REAL_SHA"

          python3 -c "
          import json, sys
          sha = sys.argv[1]
          with open('versions.json', 'r') as f:
              data = json.load(f)
          ver = data['bazel'].split(':')[0]
          data['bazel'] = ver + ':' + sha
          data['xcode'] = '16.4'
          data['macos'] = '15'
          with open('versions.json', 'w') as f:
              json.dump(data, f, indent=4)
          print('versions.json patched:', data['bazel'])
          " "$REAL_SHA"

      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py             --cacheDir="$HOME/bazel-cache"             --overrideXcodeVersion             generateProject             --configurationPath=build-system/template_minimal_development_configuration.json             --xcodeManagedCodesigning             --disableProvisioningProfiles             --disableExtensions

      - name: Build IPA via Bazel
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            PLATFORM="darwin-arm64"
          else
            PLATFORM="darwin-x86_64"
          fi
          BAZEL_VERSION=$(python3 -c "import json; print(json.load(open('versions.json'))['bazel'].split(':')[0])")
          BAZEL="build-input/bazel-${BAZEL_VERSION}-${PLATFORM}"

          $BAZEL build //Telegram:Telegram             --//Telegram:disableExtensions             --//Telegram:disableProvisioningProfiles             --//Telegram:disableStripping             --ios_multi_cpus=arm64             --apple_platform_type=ios             -c opt             --verbose_failures 2>&1 | tail -50

      - name: Find and package IPA
        run: |
          echo "=== Searching bazel-bin ==="
          find bazel-bin -name "*.ipa" 2>/dev/null | head -10
          find bazel-bin -name "*.app" 2>/dev/null | head -10
          find bazel-bin -name "Telegram" -type f 2>/dev/null | head -5

          IPA_PATH=$(find bazel-bin -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ]; then
            echo "Found IPA: $IPA_PATH"
            cp "$IPA_PATH" Ghostgram.ipa
          else
            APP_PATH=$(find bazel-bin -name "Telegram.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              echo "Found .app: $APP_PATH"
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -r Ghostgram.ipa Payload/
            else
              echo "ERROR: Neither .ipa nor .app found"
              find bazel-bin -maxdepth 5 2>/dev/null | head -30
              exit 1
            fi
          fi
          echo "IPA size: $(du -sh Ghostgram.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram_unsigned
          path: Ghostgram.ipa
          retention-days: 7
