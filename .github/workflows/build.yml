name: Build Ghostgram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write build configuration
        run: |
          cat > build-system/template_minimal_development_configuration.json << 'EOF'
          {
            "bundle_id": "org.ghostgram.Telegram",
            "api_id": "31594520",
            "api_hash": "ae0b6c1dbcf117dd791bb993f8e33df9",
            "team_id": "PLACEHOLDER",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

      - name: Patch .bazelrc for Bazel 8
        run: |
          echo "common --enable_workspace=true" >> .bazelrc

      - name: Patch BUILD - remove provisioning profile requirement
        run: |
          python3 - << 'EOF'
          import re

          with open('Telegram/BUILD', 'r') as f:
              content = f.read()

          content = re.sub(
              r'provisioning_profile\s*=\s*select\(\{[^}]+\}\s*,\s*[^)]+\)\s*,',
              'provisioning_profile = None,',
              content
          )

          with open('Telegram/BUILD', 'w') as f:
              f.write(content)

          print("BUILD patched successfully")
          import subprocess
          result = subprocess.run(['grep', '-n', 'provisioning_profile', 'Telegram/BUILD'],
                                  capture_output=True, text=True)
          print(result.stdout)
          EOF

      - name: Install Bazelisk
        run: brew install bazelisk

      - name: Download Bazel and patch versions.json
        run: |
          BAZEL_VERSION=$(python3 -c "
          import json
          v = json.load(open('versions.json'))['bazel']
          print(v.split(':')[0])
          ")

          if [ "$(uname -m)" = "arm64" ]; then
            PLATFORM="darwin-arm64"
          else
            PLATFORM="darwin-x86_64"
          fi

          BAZEL_NAME="bazel-${BAZEL_VERSION}-${PLATFORM}"
          mkdir -p build-input

          echo "Downloading $BAZEL_NAME..."
          curl -L \
            "https://github.com/bazelbuild/bazel/releases/download/${BAZEL_VERSION}/${BAZEL_NAME}" \
            -o "build-input/${BAZEL_NAME}"
          chmod +x "build-input/${BAZEL_NAME}"

          REAL_SHA=$(shasum -a 256 "build-input/${BAZEL_NAME}" | awk '{print $1}')
          echo "Real SHA256: $REAL_SHA"

          python3 -c "
          import json, sys
          sha = sys.argv[1]
          with open('versions.json', 'r') as f:
              data = json.load(f)
          ver = data['bazel'].split(':')[0]
          data['bazel'] = ver + ':' + sha
          data['xcode'] = '16.4'
          data['macos'] = '15'
          with open('versions.json', 'w') as f:
              json.dump(data, f, indent=4)
          print('versions.json patched:', data['bazel'])
          " "$REAL_SHA"

      - name: Generate Xcode project
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/bazel-cache" \
            --overrideXcodeVersion \
            generateProject \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles \
            --disableExtensions

      - name: Build IPA
        run: |
          XCODEPROJ=$(find . -name "*.xcodeproj" -maxdepth 3 | head -1)
          echo "Using project: $XCODEPROJ"

          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme Telegram \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$PWD/ghostgram.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create IPA
        run: |
          APP_PATH=$(find ghostgram.xcarchive -name "*.app" | head -1)
          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Ghostgram.ipa Payload/
          echo "IPA size: $(du -sh Ghostgram.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram_unsigned
          path: Ghostgram.ipa
          retention-days: 7
